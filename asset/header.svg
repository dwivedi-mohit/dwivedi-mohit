<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#161b22"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#bc8cff"/>
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#79c0ff"/>
      <stop offset="50%" style="stop-color:#d2a8ff"/>
      <stop offset="100%" style="stop-color:#ff7b72"/>
    </linearGradient>
    <linearGradient id="cube1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="cube2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="cube3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7ee787;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#bc8cff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7ee787;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7ee787;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <style>
    @keyframes float1 { 0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(15deg)} }
    @keyframes float2 { 0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-15px) rotate(-10deg)} }
    @keyframes float3 { 0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-25px) rotate(8deg)} }
    @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:0.8;transform:scale(1.2)} }
    @keyframes orbit { 0%{transform:rotate(0deg) translateX(80px) rotate(0deg)}100%{transform:rotate(360deg) translateX(80px) rotate(-360deg)} }
    @keyframes orbit2 { 0%{transform:rotate(120deg) translateX(100px) rotate(-120deg)}100%{transform:rotate(480deg) translateX(100px) rotate(-480deg)} }
    @keyframes orbit3 { 0%{transform:rotate(240deg) translateX(60px) rotate(-240deg)}100%{transform:rotate(600deg) translateX(60px) rotate(-600deg)} }
    @keyframes dash { 0%{stroke-dashoffset:1000}100%{stroke-dashoffset:0} }
    @keyframes fadeSlideUp { 0%{opacity:0;transform:translateY(30px)}100%{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{fill:url(#glow2);opacity:0.8}50%{opacity:1}100%{fill:url(#glow2);opacity:0.8} }
    @keyframes starTwinkle { 0%,100%{opacity:0.2;r:1}50%{opacity:1;r:2.5} }
    @keyframes starTwinkle2 { 0%,100%{opacity:0.1;r:0.8}50%{opacity:0.9;r:2} }
    @keyframes gridPulse { 0%,100%{opacity:0.03}50%{opacity:0.08} }
    @keyframes textGlow { 0%,100%{filter:url(#glowFilter)}50%{filter:url(#bigGlow)} }
    @keyframes cubeRotate { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
    @keyframes hexFloat { 0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)} }
    @keyframes ringPulse { 0%,100%{stroke-dashoffset:0;opacity:0.3}50%{stroke-dashoffset:50;opacity:0.7} }
    @keyframes particleDrift { 0%{transform:translateY(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-400px);opacity:0} }
    .cube1{animation:float1 6s ease-in-out infinite;transform-origin:center}
    .cube2{animation:float2 8s ease-in-out infinite;transform-origin:center}
    .cube3{animation:float3 7s ease-in-out infinite;transform-origin:center}
    .orb{animation:pulse 4s ease-in-out infinite}
    .orbit-dot1{animation:orbit 8s linear infinite;transform-origin:600px 200px}
    .orbit-dot2{animation:orbit2 12s linear infinite;transform-origin:600px 200px}
    .orbit-dot3{animation:orbit3 6s linear infinite;transform-origin:600px 200px}
    .line-draw{stroke-dasharray:1000;animation:dash 3s ease-in-out forwards}
    .title{animation:fadeSlideUp 1.5s ease-out forwards,textGlow 4s ease-in-out infinite}
    .subtitle{animation:fadeSlideUp 1.5s ease-out 0.3s forwards;opacity:0}
    .star{animation:starTwinkle 3s ease-in-out infinite}
    .star2{animation:starTwinkle2 4s ease-in-out infinite}
    .grid{animation:gridPulse 6s ease-in-out infinite}
    .hex{animation:hexFloat 5s ease-in-out infinite}
    .ring{animation:ringPulse 3s ease-in-out infinite;stroke-dasharray:20 10}
    .particle{animation:particleDrift 8s linear infinite}
  </style>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>
  
  <!-- Animated Grid -->
  <g class="grid">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#30363d" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#30363d" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#30363d" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#30363d" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#30363d" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#30363d" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#30363d" stroke-width="0.5"/>
  </g>

  <!-- Stars -->
  <circle class="star" cx="50" cy="30" r="1.5" fill="#58a6ff" style="animation-delay:0s"/>
  <circle class="star2" cx="150" cy="70" r="1" fill="#bc8cff" style="animation-delay:0.5s"/>
  <circle class="star" cx="280" cy="40" r="1.8" fill="#7ee787" style="animation-delay:1s"/>
  <circle class="star2" cx="380" cy="90" r="1.2" fill="#ff7b72" style="animation-delay:1.5s"/>
  <circle class="star" cx="520" cy="25" r="1.5" fill="#79c0ff" style="animation-delay:0.3s"/>
  <circle class="star2" cx="680" cy="55" r="1" fill="#d2a8ff" style="animation-delay:0.8s"/>
  <circle class="star" cx="820" cy="35" r="2" fill="#58a6ff" style="animation-delay:1.2s"/>
  <circle class="star2" cx="950" cy="65" r="1.3" fill="#ffa657" style="animation-delay:0.6s"/>
  <circle class="star" cx="1100" cy="45" r="1.5" fill="#7ee787" style="animation-delay:1.8s"/>
  <circle class="star2" cx="1150" cy="100" r="1" fill="#bc8cff" style="animation-delay:2s"/>
  <circle class="star" cx="70" cy="350" r="1.2" fill="#ff7b72" style="animation-delay:0.7s"/>
  <circle class="star2" cx="200" cy="370" r="1.5" fill="#58a6ff" style="animation-delay:1.3s"/>
  <circle class="star" cx="900" cy="360" r="1.8" fill="#d2a8ff" style="animation-delay:0.4s"/>
  <circle class="star2" cx="1050" cy="340" r="1" fill="#7ee787" style="animation-delay:1.6s"/>
  <circle class="star" cx="450" cy="380" r="1.3" fill="#ffa657" style="animation-delay:2.2s"/>
  <circle class="star2" cx="750" cy="370" r="1.5" fill="#79c0ff" style="animation-delay:0.9s"/>

  <!-- Rising Particles -->
  <circle class="particle" cx="100" cy="400" r="2" fill="#58a6ff" opacity="0.5" style="animation-delay:0s"/>
  <circle class="particle" cx="300" cy="400" r="1.5" fill="#bc8cff" opacity="0.4" style="animation-delay:2s"/>
  <circle class="particle" cx="500" cy="400" r="2.5" fill="#7ee787" opacity="0.3" style="animation-delay:4s"/>
  <circle class="particle" cx="700" cy="400" r="1.8" fill="#ff7b72" opacity="0.5" style="animation-delay:1s"/>
  <circle class="particle" cx="900" cy="400" r="2" fill="#d2a8ff" opacity="0.4" style="animation-delay:3s"/>
  <circle class="particle" cx="1100" cy="400" r="1.5" fill="#ffa657" opacity="0.3" style="animation-delay:5s"/>

  <!-- Glowing Orbs -->
  <circle class="orb" cx="120" cy="150" r="60" fill="url(#orb1)" style="animation-delay:0s"/>
  <circle class="orb" cx="1050" cy="280" r="50" fill="url(#orb2)" style="animation-delay:2s"/>
  <circle class="orb" cx="200" cy="320" r="40" fill="url(#orb3)" style="animation-delay:1s"/>

  <!-- 3D Floating Cube Left -->
  <g class="cube1" transform="translate(100, 120)">
    <polygon points="0,25 43,0 86,25 43,50" fill="url(#cube1)" stroke="#58a6ff" stroke-width="1"/>
    <polygon points="0,25 0,75 43,100 43,50" fill="url(#cube2)" stroke="#58a6ff" stroke-width="0.5" opacity="0.7"/>
    <polygon points="86,25 86,75 43,100 43,50" fill="url(#cube3)" stroke="#58a6ff" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- 3D Floating Cube Right -->
  <g class="cube2" transform="translate(1020, 80)">
    <polygon points="0,20 35,0 70,20 35,40" fill="url(#cube2)" stroke="#bc8cff" stroke-width="1"/>
    <polygon points="0,20 0,60 35,80 35,40" fill="url(#cube1)" stroke="#bc8cff" stroke-width="0.5" opacity="0.7"/>
    <polygon points="70,20 70,60 35,80 35,40" fill="url(#cube3)" stroke="#bc8cff" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- 3D Floating Cube Bottom -->
  <g class="cube3" transform="translate(950, 280)">
    <polygon points="0,15 26,0 52,15 26,30" fill="url(#cube3)" stroke="#7ee787" stroke-width="1"/>
    <polygon points="0,15 0,45 26,60 26,30" fill="url(#cube1)" stroke="#7ee787" stroke-width="0.5" opacity="0.7"/>
    <polygon points="52,15 52,45 26,60 26,30" fill="url(#cube2)" stroke="#7ee787" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Hexagons -->
  <g class="hex" transform="translate(80, 280)" style="animation-delay:0.5s">
    <polygon points="20,0 40,12 40,36 20,48 0,36 0,12" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  </g>
  <g class="hex" transform="translate(1100, 150)" style="animation-delay:1.5s">
    <polygon points="15,0 30,9 30,27 15,36 0,27 0,9" fill="none" stroke="#d2a8ff" stroke-width="1" opacity="0.3"/>
  </g>
  <g class="hex" transform="translate(300, 50)" style="animation-delay:2.5s">
    <polygon points="12,0 24,7 24,22 12,29 0,22 0,7" fill="none" stroke="#7ee787" stroke-width="1" opacity="0.25"/>
  </g>

  <!-- Orbiting Rings -->
  <ellipse cx="600" cy="200" rx="180" ry="30" fill="none" stroke="#58a6ff" stroke-width="0.8" opacity="0.15" transform="rotate(-15, 600, 200)"/>
  <ellipse cx="600" cy="200" rx="220" ry="35" fill="none" stroke="#bc8cff" stroke-width="0.5" opacity="0.1" transform="rotate(10, 600, 200)"/>

  <!-- Pulsing Rings -->
  <circle class="ring" cx="150" cy="200" r="25" fill="none" stroke="#58a6ff" stroke-width="1" opacity="0.3"/>
  <circle class="ring" cx="1080" cy="180" r="20" fill="none" stroke="#ff7b72" stroke-width="1" opacity="0.25" style="animation-delay:1s"/>

  <!-- Orbiting Dots -->
  <circle class="orbit-dot1" cx="0" cy="0" r="3" fill="#58a6ff" filter="url(#glowFilter)"/>
  <circle class="orbit-dot2" cx="0" cy="0" r="2.5" fill="#bc8cff" filter="url(#glowFilter)"/>
  <circle class="orbit-dot3" cx="0" cy="0" r="2" fill="#7ee787" filter="url(#glowFilter)"/>

  <!-- Connection Lines -->
  <line class="line-draw" x1="150" y1="200" x2="450" y2="180" stroke="url(#glow1)" stroke-width="0.5" opacity="0.3"/>
  <line class="line-draw" x1="750" y1="220" x2="1050" y2="200" stroke="url(#glow1)" stroke-width="0.5" opacity="0.3" style="animation-delay:0.5s"/>
  <line class="line-draw" x1="200" y1="300" x2="400" y2="250" stroke="url(#glow2)" stroke-width="0.3" opacity="0.2" style="animation-delay:1s"/>
  <line class="line-draw" x1="800" y1="100" x2="1000" y2="150" stroke="url(#glow2)" stroke-width="0.3" opacity="0.2" style="animation-delay:1.5s"/>

  <!-- Main Title -->
  <text class="title" x="600" y="170" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#glow2)" filter="url(#glowFilter)" letter-spacing="2">
    MOHIT DWIVEDI
  </text>

  <!-- Subtitle -->
  <text class="subtitle" x="600" y="215" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#8b949e" letter-spacing="6" font-weight="300">
    FULL STACK DEVELOPER • OPEN SOURCE ENTHUSIAST
  </text>

  <!-- Decorative Line Under Title -->
  <line class="line-draw" x1="380" y1="235" x2="820" y2="235" stroke="url(#glow2)" stroke-width="1.5" opacity="0.5" style="animation-delay:0.8s"/>

  <!-- Status Badge -->
  <g class="subtitle" transform="translate(510, 260)" style="animation-delay:0.6s">
    <rect x="0" y="0" width="180" height="30" rx="15" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <circle cx="20" cy="15" r="4" fill="#3fb950">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="35" y="20" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#8b949e" letter-spacing="1">Building the Future</text>
  </g>

  <!-- Bottom Wave -->
  <path d="M0,380 Q150,350 300,370 T600,360 T900,370 T1200,355 L1200,400 L0,400 Z" fill="#0d1117" opacity="0.5">
    <animate attributeName="d" dur="8s" repeatCount="indefinite" values="M0,380 Q150,350 300,370 T600,360 T900,370 T1200,355 L1200,400 L0,400 Z;M0,370 Q150,390 300,360 T600,380 T900,355 T1200,370 L1200,400 L0,400 Z;M0,380 Q150,350 300,370 T600,360 T900,370 T1200,355 L1200,400 L0,400 Z"/>
  </path>
</svg>
