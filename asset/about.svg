<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>

    <!-- Glassmorphism Panel Gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.01"/>
    </linearGradient>

    <linearGradient id="glassBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.5"/>
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#7ee787;stop-opacity:0.5"/>
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Animations -->
    <style>
      @keyframes float1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
      @keyframes float2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
      @keyframes pulseGlow { 0%,100%{opacity:0.5} 50%{opacity:1} }
      @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

      .card1 { animation: float1 6s ease-in-out infinite; transform-origin: center; }
      .card2 { animation: float2 8s ease-in-out infinite; transform-origin: center; }
      .terminal-text { font-family: 'Fira Code', 'Consolas', monospace; font-size: 15px; fill: #c9d1d9; }
      .keyword { fill: #ff7b72; }
      .string { fill: #a5d6ff; }
      .variable { fill: #79c0ff; }
      .comment { fill: #8b949e; }
      .tech-title { font-family: 'Segoe UI', sans-serif; font-weight: 700; font-size: 18px; fill: #ffffff; }
      .tech-item { font-family: 'Segoe UI', sans-serif; font-size: 14px; fill: #c9d1d9; }
      .glow-dot { animation: pulseGlow 3s infinite; }
      .cursor { animation: blink 1s step-end infinite; fill: #58a6ff; }
    </style>
  </defs>

  <rect width="1200" height="500" fill="url(#bg)"/>

  <!-- Left Side: Terminal Window -->
  <svg x="50" y="40" width="520" height="420" overflow="visible">
    <g class="card1">
      <!-- Glass Panel -->
      <rect width="520" height="420" rx="15" fill="url(#glass)" stroke="url(#glassBorder)" stroke-width="1.5"/>
      
      <!-- Terminal Header -->
      <path d="M0,15 Q0,0 15,0 L505,0 Q520,0 520,15 L520,40 L0,40 Z" fill="#010409" opacity="0.6"/>
      <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
      <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
      <circle cx="60" cy="20" r="6" fill="#27c93f"/>
      <text x="260" y="25" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#8b949e">mohit@nexus: ~/about-me</text>

      <!-- Terminal Content -->
      <svg x="25" y="70" overflow="visible">
        <text class="terminal-text" y="0"><tspan class="comment"># Initialize profile protocol</tspan></text>
        
        <text class="terminal-text" y="30"><tspan class="keyword">const</tspan> <tspan class="variable">developer</tspan> = {</text>
        <text class="terminal-text" y="55">  name: <tspan class="string">"Mohit Dwivedi"</tspan>,</text>
        <text class="terminal-text" y="80">  location: <tspan class="string">"India 🇮🇳"</tspan>,</text>
        <text class="terminal-text" y="105">  role: <tspan class="string">"Full Stack Engineer"</tspan>,</text>
        <text class="terminal-text" y="130">  status: <tspan class="string">"Always shipping 🚀"</tspan>,</text>
        <text class="terminal-text" y="155">  fuel: <tspan class="string">"∞ cups/day ☕"</tspan></text>
        <text class="terminal-text" y="180">};</text>

        <text class="terminal-text" y="230"><tspan class="keyword">let</tspan> <tspan class="variable">currentMissions</tspan> = [</text>
        <text class="terminal-text" y="255">  <tspan class="string">"World Need"</tspan>,</text>
        <text class="terminal-text" y="280">  <tspan class="string">"AI Nexus"</tspan></text>
        <text class="terminal-text" y="305">];</text>

        <text class="terminal-text" y="340"><tspan class="variable">console</tspan>.<tspan class="keyword">log</tspan>(<tspan class="string">"Automating the un-automatable..."</tspan>);</text>
        <text class="terminal-text" y="370"><tspan class="keyword">root@nexus</tspan> <tspan class="variable">~ $</tspan> <tspan class="cursor">█</tspan></text>
      </svg>
    </g>
  </svg>

  <!-- Right Side: Tech Stack Floating Grid -->
  <svg x="630" y="40" width="520" height="420" overflow="visible">
    <g class="card2">
      
      <!-- Title -->
      <text x="250" y="30" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#ffffff" filter="url(#glow)">TECH ARSENAL</text>
      <line x1="150" y1="45" x2="350" y2="45" stroke="#bc8cff" stroke-width="2" filter="url(#glow)"/>

      <!-- Frontend Box -->
      <svg x="0" y="70" overflow="visible">
        <rect width="230" height="150" rx="10" fill="url(#glass)" stroke="#58a6ff" stroke-width="1" stroke-opacity="0.5"/>
        <circle class="glow-dot" cx="20" cy="25" r="4" fill="#58a6ff" filter="url(#glow)"/>
        <text class="tech-title" x="35" y="30">Frontend</text>
        <line x1="10" y1="45" x2="220" y2="45" stroke="#30363d" stroke-width="1"/>
        <text class="tech-item" x="20" y="70">⚛️ React</text>
        <text class="tech-item" x="120" y="70">⬛ Next.js</text>
        <text class="tech-item" x="20" y="100">📘 TypeScript</text>
        <text class="tech-item" x="120" y="100">🟨 JavaScript</text>
        <text class="tech-item" x="20" y="130">🎨 CSS3</text>
        <text class="tech-item" x="120" y="130">🌐 HTML5</text>
      </svg>

      <!-- Backend Box -->
      <svg x="250" y="70" overflow="visible">
        <rect width="230" height="150" rx="10" fill="url(#glass)" stroke="#7ee787" stroke-width="1" stroke-opacity="0.5"/>
        <circle class="glow-dot" cx="20" cy="25" r="4" fill="#7ee787" filter="url(#glow)"/>
        <text class="tech-title" x="35" y="30">Backend</text>
        <line x1="10" y1="45" x2="220" y2="45" stroke="#30363d" stroke-width="1"/>
        <text class="tech-item" x="20" y="70">🐍 Python</text>
        <text class="tech-item" x="120" y="70">🟩 Node.js</text>
        <text class="tech-item" x="20" y="100">⚡ FastAPI</text>
        <text class="tech-item" x="120" y="100">🚂 Express</text>
        <text class="tech-item" x="20" y="130">🦅 Deno</text>
        <text class="tech-item" x="120" y="130">☕ Java</text>
      </svg>

      <!-- DB & DevOps Box -->
      <svg x="0" y="240" overflow="visible">
        <rect width="230" height="150" rx="10" fill="url(#glass)" stroke="#bc8cff" stroke-width="1" stroke-opacity="0.5"/>
        <circle class="glow-dot" cx="20" cy="25" r="4" fill="#bc8cff" filter="url(#glow)"/>
        <text class="tech-title" x="35" y="30">Data &amp; DevOps</text>
        <line x1="10" y1="45" x2="220" y2="45" stroke="#30363d" stroke-width="1"/>
        <text class="tech-item" x="20" y="70">🐘 PostgreSQL</text>
        <text class="tech-item" x="130" y="70">🍃 MongoDB</text>
        <text class="tech-item" x="20" y="100">🐳 Docker</text>
        <text class="tech-item" x="130" y="100">🔴 Redis</text>
        <text class="tech-item" x="20" y="130">☁️ Cloud / AWS</text>
        <text class="tech-item" x="130" y="130">🐙 CI/CD</text>
      </svg>

      <!-- AI/ML Box -->
      <svg x="250" y="240" overflow="visible">
        <rect width="230" height="150" rx="10" fill="url(#glass)" stroke="#ff7b72" stroke-width="1" stroke-opacity="0.5"/>
        <circle class="glow-dot" cx="20" cy="25" r="4" fill="#ff7b72" filter="url(#glow)"/>
        <text class="tech-title" x="35" y="30">AI &amp; ML</text>
        <line x1="10" y1="45" x2="220" y2="45" stroke="#30363d" stroke-width="1"/>
        <text class="tech-item" x="20" y="70">🤖 LLMs</text>
        <text class="tech-item" x="130" y="70">🧠 TensorFlow</text>
        <text class="tech-item" x="20" y="100">✨ OpenAI</text>
        <text class="tech-item" x="130" y="100">🤗 Hugging Face</text>
        <text class="tech-item" x="20" y="130">🔥 PyTorch</text>
        <text class="tech-item" x="130" y="130">📊 Pandas</text>
      </svg>
    </g>
  </svg>

  <!-- Floating Particles -->
  <circle cx="600" cy="250" r="2" fill="#58a6ff" opacity="0.6">
    <animate attributeName="cy" values="250;200;250" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="580" cy="350" r="1.5" fill="#bc8cff" opacity="0.4">
    <animate attributeName="cy" values="350;300;350" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
