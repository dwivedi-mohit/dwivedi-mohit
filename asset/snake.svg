<svg width="1200" height="200" viewBox="0 0 1200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="sline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="33%" style="stop-color:#bc8cff"/>
      <stop offset="66%" style="stop-color:#7ee787"/>
      <stop offset="100%" style="stop-color:#ff7b72"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes moveLine{0%{stroke-dashoffset:2400}100%{stroke-dashoffset:0}}
    @keyframes nodeAppear{0%{r:0;opacity:0}100%{r:6;opacity:1}}
    @keyframes nodePulse{0%,100%{r:5;opacity:0.7}50%{r:8;opacity:1}}
    @keyframes labelFade{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
    .sline{stroke-dasharray:2400;animation:moveLine 4s ease-in-out forwards}
    .node{animation:nodeAppear 0.5s ease-out forwards,nodePulse 3s ease-in-out 0.5s infinite}
    .nlabel{animation:labelFade 0.5s ease-out forwards;opacity:0;font-family:'Segoe UI',Arial,sans-serif;font-size:11px;fill:#c9d1d9;text-anchor:middle}
    .nicon{animation:labelFade 0.5s ease-out forwards;opacity:0;font-family:'Segoe UI',Arial,sans-serif;font-size:22px;text-anchor:middle}
  </style>
  <rect width="1200" height="200" fill="url(#sbg)"/>
  
  <!-- Connection Line -->
  <path class="sline" d="M60,100 C150,100 150,60 240,60 C330,60 330,140 420,140 C510,140 510,80 600,80 C690,80 690,120 780,120 C870,120 870,60 960,60 C1050,60 1050,100 1140,100" fill="none" stroke="url(#sline)" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Nodes -->
  <circle class="node" cx="60" cy="100" fill="#58a6ff" style="animation-delay:0.3s"/>
  <circle class="node" cx="240" cy="60" fill="#f0883e" style="animation-delay:0.7s"/>
  <circle class="node" cx="420" cy="140" fill="#3fb950" style="animation-delay:1.1s"/>
  <circle class="node" cx="600" cy="80" fill="#bc8cff" style="animation-delay:1.5s"/>
  <circle class="node" cx="780" cy="120" fill="#79c0ff" style="animation-delay:1.9s"/>
  <circle class="node" cx="960" cy="60" fill="#ff7b72" style="animation-delay:2.3s"/>
  <circle class="node" cx="1140" cy="100" fill="#7ee787" style="animation-delay:2.7s"/>
  
  <!-- Icons -->
  <text class="nicon" x="60" y="73" style="animation-delay:0.5s">⚛️</text>
  <text class="nicon" x="240" y="33" style="animation-delay:0.9s">🐍</text>
  <text class="nicon" x="420" y="170" style="animation-delay:1.3s">🟢</text>
  <text class="nicon" x="600" y="53" style="animation-delay:1.7s">🔷</text>
  <text class="nicon" x="780" y="150" style="animation-delay:2.1s">🐳</text>
  <text class="nicon" x="960" y="33" style="animation-delay:2.5s">☁️</text>
  <text class="nicon" x="1140" y="73" style="animation-delay:2.9s">🤖</text>
  
  <!-- Labels -->
  <text class="nlabel" x="60" y="130" style="animation-delay:0.6s">React</text>
  <text class="nlabel" x="240" y="90" style="animation-delay:1s">Python</text>
  <text class="nlabel" x="420" y="120" style="animation-delay:1.4s">Node.js</text>
  <text class="nlabel" x="600" y="110" style="animation-delay:1.8s">TypeScript</text>
  <text class="nlabel" x="780" y="100" style="animation-delay:2.2s">Docker</text>
  <text class="nlabel" x="960" y="90" style="animation-delay:2.6s">Cloud</text>
  <text class="nlabel" x="1140" y="130" style="animation-delay:3s">AI/ML</text>
</svg>
